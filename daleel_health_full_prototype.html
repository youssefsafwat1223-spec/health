<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>دليل الصحة - Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0F6E56;
      --primary-dark: #085041;
      --primary-light: #1A8F70;
      --bg: #0D1117;
      --surface: #21262D;
      --surface-2: #161B22;
      --surface-3: #2A313A;
      --text: #E6EDF3;
      --muted: #8B949E;
      --line: #30363D;
      --green: #3FB950;
      --blue: #58A6FF;
      --orange: #F78166;
      --pink: #F778BA;
      --purple: #BC8CFF;
      --yellow: #E3B341;
      --danger: #FF6B6B;
      --shadow: 0 28px 80px rgba(0, 0, 0, .34);
      --font: "Cairo", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body.light {
      --bg: #F0F8F4;
      --surface: #FFFFFF;
      --surface-2: #EAF4EF;
      --surface-3: #F8FCFA;
      --text: #1A2E28;
      --muted: #6C7A75;
      --line: #D9E9E1;
      --shadow: 0 28px 70px rgba(15, 110, 86, .16);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      background:
        radial-gradient(circle at 15% 5%, rgba(26, 143, 112, .28), transparent 32%),
        radial-gradient(circle at 90% 8%, rgba(88, 166, 255, .14), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow-x: hidden;
    }

    button, input, textarea { font-family: inherit; }
    button { cursor: pointer; }
    a { color: inherit; text-decoration: none; }

    .prototype {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 28px;
      padding: 22px;
    }

    .sidebar {
      position: sticky;
      top: 22px;
      height: calc(100vh - 44px);
      border: 1px solid var(--line);
      border-radius: 22px;
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto auto 1fr;
    }

    .side-head { padding: 18px 18px 12px; border-bottom: 1px solid var(--line); }
    .brand { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 44px; height: 44px; border-radius: 14px;
      display: grid; place-items: center;
      background: linear-gradient(145deg, var(--primary), var(--primary-light));
      color: white; font-weight: 900; font-size: 24px;
      box-shadow: 0 16px 36px rgba(15, 110, 86, .28);
    }
    .brand strong { display: block; font-size: 18px; }
    .brand span { display: block; color: var(--muted); font-size: 12px; margin-top: 2px; }

    .toolbar { display: grid; grid-template-columns: 1fr 46px; gap: 10px; padding: 12px 18px; }
    .theme-toggle, .side-search {
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--text);
      border-radius: 14px;
      min-height: 44px;
    }
    .side-search { width: 100%; padding: 0 12px; outline: none; }
    .theme-toggle { font-size: 18px; }

    .nav-list {
      overflow: auto;
      padding: 10px;
      scrollbar-width: thin;
    }
    .nav-group-title {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      padding: 12px 10px 6px;
    }
    .nav-link {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--muted);
      display: grid;
      grid-template-columns: 24px 1fr;
      gap: 8px;
      align-items: center;
      text-align: right;
      padding: 9px 10px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
    }
    .nav-link.active {
      background: color-mix(in srgb, var(--primary) 20%, transparent);
      color: var(--text);
    }
    .nav-link small {
      width: 22px; height: 22px; border-radius: 8px;
      display: grid; place-items: center;
      background: var(--surface-3);
      color: var(--primary-light);
      font-size: 11px;
    }

    .workspace {
      min-height: calc(100vh - 44px);
      display: grid;
      place-items: center;
      padding: 8px;
    }

    .phone {
      width: 393px;
      height: 852px;
      border: 1px solid color-mix(in srgb, var(--line) 80%, white 10%);
      border-radius: 48px;
      background: #070A0D;
      padding: 12px;
      box-shadow: 0 42px 110px rgba(0, 0, 0, .42);
      position: relative;
    }
    .phone:before {
      content: "";
      position: absolute;
      top: 10px; left: 50%;
      width: 126px; height: 34px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: #050608;
      z-index: 8;
    }

    .device {
      height: 100%;
      border-radius: 38px;
      overflow: hidden;
      background: var(--bg);
      position: relative;
      border: 1px solid rgba(255,255,255,.06);
      overscroll-behavior: contain;
      touch-action: pan-y;
    }

    .status {
      height: 48px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      padding: 0 24px 8px;
      font-size: 12px;
      font-weight: 800;
      color: var(--text);
      background: var(--bg);
      position: relative;
      z-index: 2;
    }

    #screens {
      height: calc(100% - 48px);
      position: relative;
      overflow: hidden;
    }

    .screen {
      display: none;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 14px 16px 104px;
      animation: rise .22s ease both;
      scrollbar-width: thin;
      scrollbar-color: color-mix(in srgb, var(--primary) 70%, transparent) transparent;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
    }
    .screen::-webkit-scrollbar { width: 4px; }
    .screen::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 999px; }
    .screen::-webkit-scrollbar-track { background: transparent; }
    .screen.active { display: block; }
    @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .bottom-nav {
      position: absolute;
      left: 14px; right: 14px; bottom: 14px;
      height: 82px;
      border: 1px solid var(--line);
      border-radius: 26px;
      background: color-mix(in srgb, var(--surface) 94%, transparent);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      padding: 8px;
      z-index: 7;
      box-shadow: 0 20px 44px rgba(0,0,0,.18);
    }
    .tab-btn {
      border: 0;
      border-radius: 18px;
      background: transparent;
      color: var(--muted);
      display: grid;
      place-items: center;
      align-content: center;
      gap: 3px;
      font-size: 9px;
      font-weight: 800;
      line-height: 1.15;
      min-width: 0;
      padding: 4px 2px;
      transition: transform .2s ease, background .2s ease, color .2s ease;
    }
    .tab-btn b {
      width: 30px;
      height: 30px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 16px;
      line-height: 1;
      background: var(--surface-2);
      color: var(--muted);
    }
    .tab-btn span {
      max-width: 100%;
      white-space: normal;
      overflow-wrap: anywhere;
    }
    .tab-btn.active {
      color: white;
      background: var(--primary);
      transform: translateY(-10px);
      box-shadow: 0 14px 28px rgba(15, 110, 86, .3);
    }
    .tab-btn.active b {
      background: rgba(255,255,255,.18);
      color: white;
    }

    .top-row, .between, .row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .between { justify-content: space-between; }
    .stack { display: grid; gap: 12px; }

    .hero {
      border-radius: 26px;
      padding: 18px;
      background: linear-gradient(145deg, var(--primary-dark), var(--primary));
      color: white;
      position: relative;
      overflow: hidden;
      box-shadow: 0 18px 48px rgba(15,110,86,.22);
    }
    .hero:after {
      content: "";
      position: absolute;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,.08);
      top: -70px; left: -48px;
    }
    .hero > * { position: relative; z-index: 1; }
    .hero h1, .hero h2 { margin: 0; line-height: 1.25; }
    .hero p { margin: 8px 0 0; color: rgba(255,255,255,.78); font-size: 13px; }

    .page-title h2 { margin: 0; font-size: 24px; }
    .page-title p { margin: 4px 0 0; color: var(--muted); font-size: 12px; }
    .icon-btn {
      width: 42px; height: 42px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      color: var(--text);
      display: grid; place-items: center;
      font-weight: 900;
      position: relative;
    }
    .dot {
      position: absolute; top: 7px; left: 7px;
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--danger); border: 2px solid var(--surface);
    }

    .search {
      min-height: 52px;
      display: grid;
      grid-template-columns: 38px 1fr 38px;
      align-items: center;
      gap: 8px;
      padding: 7px;
      border-radius: 18px;
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--muted);
      margin: 14px 0;
    }
    .search input {
      border: 0; outline: 0; background: transparent; color: var(--text);
      font-size: 13px; min-width: 0;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      padding: 14px;
      color: var(--text);
      box-shadow: 0 10px 24px rgba(0,0,0,.08);
    }
    .soft { background: var(--surface-2); }
    .section { margin-top: 16px; }
    .section-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .section-title h3 { margin: 0; font-size: 16px; }
    .section-title button { border: 0; background: transparent; color: var(--primary-light); font-weight: 800; }

    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 9px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px 8px; }

    .service {
      min-height: 78px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface);
      color: var(--text);
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 6px;
      padding: 8px 4px;
      text-align: center;
      font-size: 10.5px;
      font-weight: 800;
      line-height: 1.35;
    }
    .service b {
      width: 34px; height: 34px;
      border-radius: 12px;
      display: grid; place-items: center;
      background: color-mix(in srgb, var(--primary) 18%, transparent);
      color: var(--primary-light);
      font-size: 15px;
    }

    .badge, .chip {
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 999px; font-size: 11px; font-weight: 800; white-space: nowrap;
    }
    .badge { padding: 5px 9px; background: color-mix(in srgb, var(--green) 18%, transparent); color: var(--green); }
    .badge.blue { background: color-mix(in srgb, var(--blue) 18%, transparent); color: var(--blue); }
    .badge.orange { background: color-mix(in srgb, var(--orange) 18%, transparent); color: var(--orange); }
    .badge.pink { background: color-mix(in srgb, var(--pink) 18%, transparent); color: var(--pink); }
    .badge.yellow { background: color-mix(in srgb, var(--yellow) 18%, transparent); color: var(--yellow); }
    .badge.danger { background: color-mix(in srgb, var(--danger) 18%, transparent); color: var(--danger); }
    .chips { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 3px; }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      border: 1px solid var(--line);
      color: var(--muted);
      background: var(--surface);
      min-height: 34px;
      padding: 7px 12px;
    }
    .chip.active { color: white; background: var(--primary); border-color: var(--primary); }

    .doctor-card, .list-card, .chat-item, .product-card, .request-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      padding: 12px;
      display: grid;
      gap: 8px;
      color: var(--text);
    }
    .doctor-card {
      grid-template-columns: 52px 1fr auto;
      align-items: center;
    }
    .avatar {
      width: 52px; height: 52px; border-radius: 17px;
      display: grid; place-items: center;
      background: color-mix(in srgb, var(--primary) 18%, transparent);
      color: var(--primary-light);
      font-weight: 900;
    }
    .round { border-radius: 50%; }
    .main strong { display: block; font-size: 14px; }
    .main p, .muted { margin: 2px 0 0; color: var(--muted); font-size: 11px; line-height: 1.6; }

    .ad {
      border: 0;
      border-radius: 20px;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), #159F84);
      color: white;
      display: block;
    }
    .ad strong { display: block; line-height: 1.5; }
    .ad span { color: rgba(255,255,255,.78); font-size: 12px; }

    .patient-sketch-home {
      padding-top: 10px;
    }
    .patient-shortcuts {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }
    .patient-shortcut {
      min-height: 54px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface);
      color: var(--text);
      display: grid;
      place-items: center;
      gap: 2px;
      font-size: 10px;
      font-weight: 900;
    }
    .patient-shortcut b { font-size: 18px; line-height: 1; }
    .patient-hero {
      border: 1px solid var(--line);
      border-radius: 22px;
      background:
        linear-gradient(145deg, color-mix(in srgb, var(--primary) 18%, transparent), transparent 55%),
        var(--surface);
      padding: 14px;
    }
    .patient-hero h2 { margin: 0; font-size: 22px; }
    .patient-hero p { margin: 4px 0 0; color: var(--muted); font-size: 12px; }
    .patient-search-row {
      display: grid;
      grid-template-columns: 1fr 74px;
      gap: 9px;
      margin-top: 12px;
    }
    .patient-search-row .search { margin: 0; }
    .barcode-tile {
      min-height: 58px;
      border: 1px dashed color-mix(in srgb, var(--primary) 60%, var(--line));
      border-radius: 18px;
      background: color-mix(in srgb, var(--primary) 12%, transparent);
      color: var(--primary-light);
      display: grid;
      place-items: center;
      font-size: 28px;
      font-weight: 900;
    }
    .ai-card {
      margin-top: 10px;
      border: 0;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--primary), #22A884);
      color: white;
      min-height: 56px;
      display: grid;
      grid-template-columns: 42px 1fr;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      text-align: right;
    }
    .ai-card b {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.16);
      font-size: 18px;
    }
    .ai-card strong { display: block; font-size: 15px; line-height: 1.2; }
    .ai-card span { display: block; color: rgba(255,255,255,.78); font-size: 11px; margin-top: 3px; }
    .account-zone {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--surface-2);
      padding: 34px 12px 12px;
      margin-top: 28px;
    }
    .account-pill {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      border: 0;
      border-radius: 16px;
      background: var(--primary);
      color: white;
      min-width: 112px;
      min-height: 48px;
      font-size: 20px;
      font-weight: 900;
      box-shadow: 0 16px 34px rgba(15, 110, 86, .34);
    }
    .account-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 9px;
    }
    .account-service {
      min-height: 72px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      color: var(--text);
      display: grid;
      place-items: center;
      gap: 5px;
      padding: 7px 4px;
      text-align: center;
      font-size: 10px;
      font-weight: 900;
      line-height: 1.3;
    }
    .account-service b {
      width: 30px;
      height: 30px;
      border-radius: 11px;
      display: grid;
      place-items: center;
      background: color-mix(in srgb, var(--primary) 16%, transparent);
      color: var(--primary-light);
      font-size: 13px;
    }
    .home-mini-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 9px;
      margin-top: 12px;
    }
    .home-mini-card {
      min-height: 66px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface);
      color: var(--text);
      display: grid;
      align-content: center;
      gap: 2px;
      padding: 10px;
      text-align: center;
      font-weight: 900;
      font-size: 11px;
    }
    .home-mini-card span { color: var(--muted); font-size: 10px; }

    .btn {
      min-height: 48px;
      border: 0;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      font-weight: 900;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn.outline { background: transparent; border: 1px solid var(--primary); color: var(--primary-light); }
    .btn.ghost { background: var(--surface-2); color: var(--text); border: 1px solid var(--line); }
    .btn.danger { background: color-mix(in srgb, var(--danger) 18%, transparent); color: var(--danger); }
    .full { width: 100%; }

    .metric {
      min-height: 88px;
      display: grid;
      align-content: center;
      gap: 5px;
    }
    .metric strong { font-size: 20px; color: var(--text); }
    .metric span { color: var(--muted); font-size: 11px; }

    .form { display: grid; gap: 10px; }
    .field, textarea {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      color: var(--text);
      padding: 0 12px;
      outline: none;
    }
    textarea { min-height: 92px; resize: none; padding-top: 12px; }
    .steps { display: flex; align-items: center; justify-content: center; gap: 7px; margin: 12px 0; }
    .step-dot { width: 9px; height: 9px; border-radius: 99px; background: var(--line); }
    .step-dot.active { width: 28px; background: var(--primary); }

    .tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; background: var(--surface-2); border-radius: 14px; padding: 5px; }
    .tab-choice { border: 0; border-radius: 10px; min-height: 38px; background: transparent; color: var(--muted); font-weight: 800; }
    .tab-choice.active { background: var(--primary); color: white; }
    .tab-panel { display: none; margin-top: 12px; }
    .tab-panel.active { display: grid; gap: 10px; }

    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
    .day {
      min-height: 34px; border-radius: 10px; display: grid; place-items: center;
      background: var(--surface-2); color: var(--muted); font-size: 12px; font-weight: 800;
    }
    .day.ok { color: var(--green); border: 1px solid color-mix(in srgb, var(--green) 35%, transparent); }
    .day.selected { color: white; background: var(--primary); }
    .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .time { min-height: 42px; border: 1px solid var(--line); border-radius: 12px; background: var(--surface); color: var(--text); font-weight: 800; }
    .time.active { background: var(--primary); color: white; border-color: var(--primary); }
    .time.off { opacity: .45; text-decoration: line-through; }

    .bubble {
      max-width: 82%;
      border-radius: 18px;
      padding: 11px 13px;
      font-size: 12px;
      line-height: 1.7;
      background: var(--surface);
      border: 1px solid var(--line);
    }
    .bubble.out { margin-right: auto; background: var(--primary); color: white; border-color: var(--primary); }
    .chat-input {
      position: sticky; bottom: 0;
      display: grid; grid-template-columns: 34px 34px 34px 1fr 42px;
      gap: 6px; align-items: center;
      background: var(--bg);
      padding-top: 10px;
    }

    .skeleton { position: relative; overflow: hidden; color: transparent !important; }
    .skeleton:after {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.13), transparent);
      animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    @keyframes load { from { width: 18%; } to { width: 92%; } }

    .fab {
      position: sticky;
      bottom: 8px;
      margin: 16px 0 0;
      width: 56px; height: 56px;
      border-radius: 18px;
      border: 0;
      background: var(--primary);
      color: white;
      font-size: 24px;
      box-shadow: 0 16px 36px rgba(15,110,86,.34);
      float: left;
    }

    .admin-shell {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 10px;
      min-height: 640px;
    }
    .admin-mini-nav {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      padding: 8px;
      display: grid;
      align-content: start;

      providerPreview: () => `<div class="screen" data-screen="providerPreview">${screenTop("معاينة بروفايل المزود", "كما يظهر للمريض", "providerDash")}<div class="hero"><div class="row"><span class="avatar">ص.ن</span><span><h2>صيدلية النور</h2><p>خافرة، توصيل، أقساط، موثقة</p></span></div></div><div class="stack section"><div class="card">📍 بغداد - المنصور | 1.2 كم</div><div class="card">☎ 07701234567 | واتساب | فيسبوك | إنستغرام</div><div class="card">⭐ 4.8 من 320 تقييم | ♡ مفضلة | ↗ مشاركة باركود</div><div class="card">عروض حالية: خصم 15% على منتجات السكري</div></div></div>`,

      providerSettings: () => `<div class="screen" data-screen="providerSettings">${screenTop("إعدادات مقدم الخدمة", "ظهور الأسعار، POS، الاشتراك", "providerDash")}<div class="stack section">${[["إظهار الأسعار: جزئي حسب المنتج","providerProducts"],["ربط POS: غير متصل","providerSettings"],["نوع الاشتراك: فضي","plans"],["إشعارات المتابعين: مفعلة","providerSettings"],["استقبال الطلبات: مفعل","providerRequests"],["وضع الصيانة: غير مفعل","verificationPending"]].map(([x,go])=>`<button class="card between" data-go="${go}"><span>${x}</span><span>‹</span></button>`).join("")}<button class="ad" data-go="plans"><strong>خطط الاشتراك</strong><span>مجاني، برونزي، فضي، ذهبي</span></button></div></div>`,

      doseCalculator: () => `<div class="screen" data-screen="doseCalculator">${screenTop("حساب الجرعة", "خاص بالصيدلية ويظهر للصيدلي فقط", "providerDash")}<div class="form section"><input class="field" value="Paracetamol"><input class="field" value="وزن المريض: 18 كغ"><input class="field" value="العمر: 5 سنوات"><input class="field" value="التركيز: 120mg/5ml"><button class="btn full">احسب الجرعة</button></div><div class="card section"><div class="between"><strong>النتيجة المقترحة</strong><span class="badge">10-15mg/kg</span></div><p class="muted">الجرعة التقريبية: 7.5ml كل 6 ساعات عند الحاجة. تظهر رسالة تنبيه: راجع الطبيب أو الصيدلي قبل استخدام أي علاج.</p></div><div class="card section"><strong>تنبيه سلامة</strong><p class="muted">الأداة مساعدة ولا تستبدل القرار الطبي، وتحتاج مراجعة حساسية الدواء والأمراض المزمنة.</p></div></div>`,

      repDashboard: () => `<div class="screen" data-screen="repDashboard">${screenTop("مندوب شركة", "إدارة منتجات وعروض MR Group", "accountType")}<div class="hero"><div class="row"><span class="avatar">م.ش</span><span><h2>مندوب شركة الرافدين الدوائية</h2><p>● موثق - بغداد والفرات الأوسط</p></span></div></div><div class="grid-3 section">${["📦 منتجاتي","📢 بوسترات علمية","💰 عروض الشركة","🧾 باج التحقق","🗺 خطوط التوزيع","💬 تواصل الصيدليات"].map(x=>`<button class="service"><b>${x.split(" ")[0]}</b><span>${x.substring(2)}</span></button>`).join("")}</div><section class="section stack"><h3>طلبات وتواصل</h3><div class="card"><strong>صيدلية الرحمة</strong><p class="muted">طلب توفير دواء ضغط غير متوفر - منذ 20 دقيقة</p><span class="badge">رد سريع</span></div><div class="card"><strong>منشور MR Group</strong><p class="muted">عرض علمي عن مكمل Omega 3 مع بوستر مرفق وتعليقات الصيادلة.</p><span class="badge blue">MR Group</span></div></section></div>`,

      rxGroup: () => `<div class="screen" data-screen="rxGroup">${screenTop("RX Group", "للصيادلة والأطباء", "providerDash")}<div class="stack section">${[["م.ع","د. محمد العامري | طب القلب | قبل 20 دقيقة","سؤال للزملاء: مريض ضغط مرتفع وعنده حساسية من Amlodipine، ما البديل المناسب؟","💬 8 تعليق | 👍 14 | ↗ مشاركة"],["ص.ن","صيدلية النور | منذ ساعة","[صورة وصفة] وصفة غير واضحة - هل هذا Metformin أم Metoprolol؟","💬 5 تعليق | 👍 7 | ↗ مشاركة"],["س.ج","د. سارة الجبوري | أطفال | منذ 3 ساعات","تنبيه: ارتفاع في حالات الإنفلونزا عند الأطفال هذا الأسبوع. جرعة Paracetamol للأطفال 10-15mg/kg كل 6 ساعات.","💬 12 تعليق | 👍 31 | ↗ مشاركة"]].map(x=>`<div class="card"><div class="row"><span class="avatar">${x[0]}</span><span><strong>${x[1]}</strong></span></div><p>${x[2]}</p><p class="muted">${x[3]}</p></div>`).join("")}</div><button class="fab">+</button></div>`,

      plans: () => `<div class="screen" data-screen="plans">${screenTop("خطط الاشتراك", "خطتك الحالية: المجانية", "providerSettings")}<div class="stack section">${[["مجاني","Free","الاسم والتخصص، العنوان والموقع، الظهور في التطبيق","خطتك الحالية"],["برونزي","70,000 د.ع / شهر","+ صورة/شعار، روابط تواصل، زر متابعة، حجز إلكتروني، مراسلة، مكتبة صور، منشورات","ترقية للبرونزي"],["فضي ⭐","90,000 د.ع / شهر","+ خدمات وأسعار، إشعارات للمتابعين، ظهور كمقترح، إعلان ممول 7 أيام، كروبات، إضافة كادر","ترقية للفضي"],["ذهبي 👑","120,000 د.ع / شهر","+ إعلان 14 يوم، فيسبوك/إنستغرام 28 يوم، أولوية بحث، POS، حسابات متعددة","ترقية للذهبي"]].map((x,i)=>`<div class="card"><div class="between"><h3>${x[0]}</h3>${i===2?'<span class="badge yellow">POPULAR</span>':""}</div><strong>${x[1]}</strong><p class="muted">${x[2]}</p><button class="btn full ${i===0?"ghost":""}">${x[3]}</button></div>`).join("")}</div></div>`,

      admin: () => `<div class="screen" data-screen="admin">${screenTop("لوحة الإدارة", "Dashboard ويب مختصر", "splash")}<div class="admin-shell section"><div class="admin-mini-nav"><button data-go="admin">الرئيسية</button><button data-go="adminProviders">المزودون</button><button data-go="adminSubscriptions">الاشتراكات</button><button data-go="adminAds">الإعلانات</button><button>التقارير</button></div><div class="stack"><div class="grid-2">${[["1,284","مستخدم"],["312","مزود خدمة"],["86","طلبات اليوم"],["14","إعلانات فعالة"]].map(x=>`<div class="card metric"><strong>${x[0]}</strong><span>${x[1]}</span></div>`).join("")}</div><div class="card"><strong>آخر النشاط</strong><p class="muted">صيدلية النور أضافت عرضاً جديداً، مختبر الحياة حدّث باقات التحليل، طلب توثيق جديد لطبيب في أربيل.</p></div><div class="card"><strong>مراجعة مزودين</strong><p class="muted">5 حسابات بانتظار التحقق من الإجازة والشهادات.</p></div></div></div></div>`,

      adminUsers: () => `<div class="screen" data-screen="adminUsers">${screenTop("إدارة المستخدمين", "مرضى، مزودون، مندوبون", "admin")}<div class="grid-3 section">${[["1,284","مرضى"],["312","مزودون"],["28","مندوبون"]].map(x=>`<div class="card metric"><strong>${x[0]}</strong><span>${x[1]}</span></div>`).join("")}</div><div class="stack section">${["أحمد العبيدي | مريض | بغداد | نشط","صيدلية النور | مزود خدمة | فضي | موثق","مندوب الرافدين | مندوب شركة | بانتظار مراجعة"].map((x,i)=>`<div class="card between"><span>${x}</span><span class="badge ${i===2?"yellow":""}">${i===2?"مراجعة":"نشط"}</span></div>`).join("")}</div></div>`,

      adminProviders: () => `<div class="screen" data-screen="adminProviders">${screenTop("مراجعة المزودين", "توثيق الوثائق والصلاحيات", "admin")}<div class="stack section">${["د. نور الراشد | طبيبة نسائية | إجازة عيادة مرفوعة | يحتاج موافقة","صيدلية الشفاء | صيدلية خافرة | إجازة فتح + شعار | قيد المراجعة","مختبر الحياة | مختبر تحاليل | وثائق كاملة | جاهز للتفعيل"].map((x,i)=>`<div class="card"><div class="between"><strong>${x}</strong><span class="badge ${i===2?"":"yellow"}">${i===2?"جاهز":"مراجعة"}</span></div><div class="grid-2 section"><button class="btn">قبول</button><button class="btn outline">طلب تعديل</button></div></div>`).join("")}</div></div>`,

      adminSubscriptions: () => `<div class="screen" data-screen="adminSubscriptions">${screenTop("الاشتراكات والمدفوعات", "تفعيل يدوي ومتابعة الخطط", "admin")}<div class="grid-3 section">${[["70,000","برونزي"],["90,000","فضي"],["120,000","ذهبي"]].map(x=>`<div class="card metric"><strong>${x[0]}</strong><span>${x[1]} / شهر</span></div>`).join("")}</div><div class="stack section">${["صيدلية النور | فضي | مدفوع حتى 30 يوليو 2026","مركز النور للأشعة | ذهبي | يحتاج تجديد خلال 5 أيام","د. محمد العامري | برونزي | تفعيل يدوي بانتظار إيصال"].map(x=>`<div class="card between"><span>${x}</span><span class="badge">إدارة</span></div>`).join("")}</div></div>`,

      adminAds: () => `<div class="screen" data-screen="adminAds">${screenTop("الإعلانات والشكاوى", "إعلانات ممولة، FAQ، وظائف، بلاغات", "admin")}<div class="stack section">${["إعلان صيدلية النور: خصم 15% على منتجات السكري | 5 أيام متبقية","وظيفة: مطلوب صيدلي خفر - بغداد | بانتظار موافقة","شكوى: تأخير نتيجة تحليل من مختبر النور | قيد المعالجة","FAQ جديد: كيفية إرسال وصفة طبية للصيدلية"].map((x,i)=>`<div class="card"><strong>${x}</strong><p class="muted">${i===0?"يمكن تمديد الإعلان أو إيقافه.":i===2?"فتح تذكرة ومراسلة المزود والمريض.":"مراجعة المحتوى قبل النشر."}</p><span class="badge ${i===2?"danger":i===1?"yellow":""}">${i===2?"شكوى":i===1?"وظيفة":"إدارة"}</span></div>`).join("")}</div></div>`
    };

    const allScreens = groups.flatMap(g => g.items);
    const screenRoot = document.getElementById("screens");
    const navRoot = document.getElementById("screenNav");
    const bottomRoot = document.getElementById("bottomNav");
    let current = "splash";
    let bookingStep = 0;

    function renderAll() {
      screenRoot.innerHTML = allScreens.map(([id]) => screens[id]()).join("");
      renderNav();
      show(current, false);
      setTimeout(() => {
        const skeleton = document.getElementById("homeSkeleton");
        const content = document.getElementById("homeContent");
        if (skeleton && content) { skeleton.style.display = "none"; content.style.display = "block"; }
      }, 900);
    }

    function renderNav(filter = "") {
      navRoot.innerHTML = groups.map(group => {
        const items = group.items.filter(([, label]) => label.toLowerCase().includes(filter.toLowerCase()) || label.includes(filter));
        if (!items.length) return "";
        return `<div class="nav-group-title">${group.title}</div>${items.map(([id, label], i) => `<button class="nav-link ${id === current ? "active" : ""}" data-go="${id}"><small>${i + 1}</small><span>${label}</span></button>`).join("")}`;
      }).join("");
    }

    function renderBottom() {
      const isProvider = ["providerDash","doctorProviderDash","labProviderDash","radiologyProviderDash","verificationPending","providerRequests","providerProducts","addEditProduct","addEditService","staffPermissions","providerPreview","providerSettings","doseCalculator","repDashboard","rxGroup","plans"].includes(current);
      const isAdmin = current === "admin";
      const tabs = isAdmin ? [] : isProvider ? providerTabs : patientTabs;
      bottomRoot.style.display = tabs.length ? "grid" : "none";
      bottomRoot.innerHTML = tabs.map(([id, label, icon]) => `<button class="tab-btn ${id === current ? "active" : ""}" data-go="${id}"><b>${icon}</b><span>${label}</span></button>`).join("");
    }

    function show(id, scroll = true) {
      if (!screens[id]) return;
      current = id;
      document.querySelectorAll(".screen").forEach(s => s.classList.toggle("active", s.dataset.screen === id));
      document.querySelectorAll(".nav-link").forEach(b => b.classList.toggle("active", b.dataset.go === id));
      renderBottom();
      if (scroll) document.querySelector(".screen.active")?.scrollTo({ top: 0, behavior: "smooth" });
    }

    document.addEventListener("click", (e) => {
      const go = e.target.closest("[data-go]");
      if (go) show(go.dataset.go);

      const tab = e.target.closest("[data-tab]");
      if (tab) {
        const wrap = tab.closest(".screen");
        wrap.querySelectorAll(".tab-choice").forEach(x => x.classList.toggle("active", x === tab));
        wrap.querySelectorAll(".tab-panel").forEach(x => x.classList.toggle("active", x.dataset.panel === tab.dataset.tab));
      }

      if (e.target.id === "bookingNext") {
        const steps = [...document.querySelectorAll(".book-step")];
        bookingStep = Math.min(bookingStep + 1, 4);
        if (bookingStep >= 4) return show("bookingConfirm");
        steps.forEach((s, i) => s.style.display = i === bookingStep ? "block" : "none");
        document.querySelectorAll(".step-dot").forEach((d, i) => d.classList.toggle("active", i <= bookingStep));
        e.target.textContent = bookingStep === 3 ? "تأكيد الحجز" : "متابعة";
      }
    });

    document.getElementById("themeToggle").addEventListener("click", () => {
      document.body.classList.toggle("light");
      document.getElementById("themeToggle").textContent = document.body.classList.contains("light") ? "☀" : "☾";
    });

    document.getElementById("screenSearch").addEventListener("input", (e) => renderNav(e.target.value));

    document.querySelector(".device").addEventListener("wheel", (e) => {
      const active = document.querySelector(".screen.active");
      if (!active) return;
      const horizontalChipScroll = e.target.closest(".chips") && Math.abs(e.deltaX) > Math.abs(e.deltaY);
      if (horizontalChipScroll) return;
      const canScroll = active.scrollHeight > active.clientHeight;
      if (!canScroll) return;
      active.scrollTop += e.deltaY;
      e.preventDefault();
    }, { passive: false });

    renderAll();
  </script>
</body>
</html>
